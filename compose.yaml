services:
  db:
    image: pgvector/pgvector:0.8.5-pg17-trixie
    environment:
      POSTGRES_DB: maistorage
      POSTGRES_USER: maistorage
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-maistorage}
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maistorage -d maistorage"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build: .
    environment:
      API_BASE_URL: http://api:8000
      DATABASE_URL: postgresql://maistorage:${POSTGRES_PASSWORD:-maistorage}@db:5432/maistorage
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5-mini}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-flash}
    command: python -m uvicorn app.api:app --host 0.0.0.0 --port 8000
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready')"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  ui:
    build: .
    environment:
      API_BASE_URL: http://api:8000
    command: python -m streamlit run app/chat_ui.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "127.0.0.1:8501:8501"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  index:
    build: .
    profiles: ["tools"]
    environment:
      DATABASE_URL: postgresql://maistorage:${POSTGRES_PASSWORD:-maistorage}@db:5432/maistorage
    command: python -m app.index
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
